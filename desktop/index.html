<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!-- viewport-fit=cover lets the layout extend under the notch / home
         indicator; the CSS then reclaims those areas with env(safe-area-inset-*).
         We deliberately keep pinch-zoom enabled (no user-scalable=no) — iOS
         input auto-zoom is prevented by 16px inputs in App.css instead. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0f1115" />
    <!-- iOS web-app chrome, honoured by the Tauri WKWebView shell. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AskMyDocs" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>AskMyDocs</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
