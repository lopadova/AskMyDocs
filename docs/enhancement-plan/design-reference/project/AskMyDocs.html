<!doctype html>
<html lang="en" data-theme="dark" data-density="balanced">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>AskMyDocs — Enterprise RAG Platform</title>
<link rel="stylesheet" href="styles/tokens.css"/>
<script type="application/json" id="tweak-defaults">
{"theme":"dark","density":"balanced","font":"geist","section":"chat"}
</script>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data/seed.jsx"></script>
<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="components/charts.jsx"></script>
<script type="text/babel" src="components/shell.jsx"></script>
<script type="text/babel" src="features/chat.jsx"></script>
<script type="text/babel" src="features/dashboard.jsx"></script>
<script type="text/babel" src="features/admin.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [theme, setTheme]       = useTheme('dark');
  const [density, setDensity]   = useDensity('balanced');
  const [font, setFont]         = useFontPair('geist');
  const [section, setSection]   = useState(() => localStorage.getItem('amd-section') || 'chat');
  const [project, setProject]   = useState(PROJECTS[0]);
  const [tweaksOpen, setTweaks] = useState(false);
  const [collapsed, setColl]    = useState(false);

  useEffect(() => { localStorage.setItem('amd-section', section); }, [section]);

  // Host tweaks protocol
  useEffect(() => {
    const handler = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode')   setTweaks(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const crumbs = {
    chat:        ['Workspace', 'Chat'],
    dashboard:   ['Admin', 'Dashboard'],
    kb:          ['Admin', 'Knowledge base', project.label],
    insights:    ['Admin', 'AI Insights'],
    users:       ['Admin', 'Users & Roles'],
    logs:        ['Operations', 'Logs'],
    maintenance: ['Operations', 'Maintenance'],
  }[section] || [];

  let View;
  if (section === 'chat')             View = <ChatView project={project}/>;
  else if (section === 'dashboard')   View = <DashboardView/>;
  else if (section === 'kb')          View = <KbView/>;
  else if (section === 'insights')    View = <InsightsView/>;
  else if (section === 'users')       View = <UsersView/>;
  else if (section === 'logs')        View = <LogsView/>;
  else if (section === 'maintenance') View = <MaintenanceView/>;

  return (
    <div data-screen-label={`01 ${section}`} style={{ display: 'flex', height: '100vh', overflow: 'hidden', background: 'var(--bg-0)', color: 'var(--fg-1)' }}>
      <Sidebar active={section} onNav={setSection} collapsed={collapsed}/>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
        <Topbar
          project={project} onProjectChange={setProject}
          theme={theme} setTheme={setTheme}
          onToggleTweaks={() => setTweaks(v => !v)}
          crumbs={crumbs}
        />
        <main style={{ flex: 1, display: 'flex', overflow: 'hidden', minHeight: 0 }}>
          {View}
        </main>
      </div>
      <CommandPalette/>
      <TweaksPanel
        open={tweaksOpen} onClose={() => setTweaks(false)}
        theme={theme} setTheme={setTheme}
        density={density} setDensity={setDensity}
        font={font} setFont={setFont}
        section={section} setSection={setSection}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
