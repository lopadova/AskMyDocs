name: tests

on:
  push:
    branches: [main, 'feature/v4.*']
  pull_request:
    branches: [main, 'feature/v4.*']

jobs:
  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Laravel 13 floor is PHP 8.3; we also guarantee 8.4 and 8.5 so
        # the package can ship against the next two PHP minors without
        # regression surprises.
        php: ['8.3', '8.4', '8.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, sqlite, pdo_sqlite, intl, bcmath
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-php${{ matrix.php }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-php${{ matrix.php }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare test bootstrap dirs
        run: |
          mkdir -p vendor/orchestra/testbench-core/laravel/bootstrap/cache
          mkdir -p bootstrap/cache

      - name: Run PHPUnit
        run: vendor/bin/phpunit --testdox

  vitest:
    name: Vitest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest (react)
        run: npm test

      - name: Run Vitest (legacy rich-content)
        run: npm run test:legacy

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    # Cap the whole job at 20 minutes — Playwright's per-test retry +
    # per-test timeout can compound to hours when a setup test
    # consistently hits a slow failure. The cap turns a debug
    # session from "hours of runner time" into a sharp 20 min loop.
    timeout-minutes: 20
    # Depends on phpunit+vitest so E2E only spins up after core gates
    # are green.
    needs: [phpunit, vitest]

    # Spin up real Postgres + pgvector so the Playwright job exercises
    # the same DB engine production runs. The pgvector/pgvector image
    # ships pgvector preinstalled; Schema::ensureVectorExtensionExists()
    # in the chunks/embedding migrations resolves cleanly here.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: askmydocs
          POSTGRES_PASSWORD: askmydocs
          POSTGRES_DB: askmydocs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U askmydocs -d askmydocs_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # verify-copilot-catalogue.sh walks `git log` to match
          # `fix(enh-*): address Copilot review on PR #N` commits
          # against catalogue rows. The default shallow checkout
          # (depth=1) hides those commits — only the merge commit is
          # visible — which would silently turn the gate into a no-op.
          # Fetch the full history so the gate sees every fix commit
          # in the PR's range.
          fetch-depth: 0

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, sqlite, pdo_sqlite, pgsql, pdo_pgsql, intl, bcmath
          coverage: none
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install PHP deps
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install JS deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify E2E real-data rule (R13)
        # Enforces CLAUDE.md §R13: page.route() is only allowed against
        # external-service boundaries (AI providers, email, payments,
        # remote storage) or with an explicit "R13: failure injection"
        # marker. Blocks merging scenarios that silently stub internal
        # routes and turn E2E into unit tests in E2E clothing.
        run: bash scripts/verify-e2e-real-data.sh

      - name: Verify Copilot findings catalogue integrity
        # Enforces COPILOT-FINDINGS.md protocol: every
        # `fix(enh-*): address Copilot review on PR #N` commit must
        # touch docs/enhancement-plan/COPILOT-FINDINGS.md with at least
        # one row under the matching `### PR #N` heading. Without this
        # gate, fix commits can silently drop from the catalogue and
        # the PR16-style distillation loses its input. See R9 and the
        # COPILOT-FINDINGS.md appendix for the protocol spec.
        run: bash scripts/verify-copilot-catalogue.sh

      - name: Build frontend bundle
        run: npm run build

      - name: Prepare .env for testing
        run: |
          cp .env.example .env || true
          php -r "file_exists('.env') || copy('.env.example', '.env');" || true
          # Override every key via in-place sed so .env ends up with
          # exactly ONE definition per setting. `.env.example` already
          # declares APP_ENV / APP_KEY / DB_* / CACHE_STORE /
          # SESSION_DRIVER / QUEUE_CONNECTION; using `echo ... >> .env`
          # for any of these would duplicate the line (Laravel reads
          # top-down and the LAST occurrence wins, but duplicates are
          # ambiguous and Copilot review flagged them on PR #83).
          # `set_env <KEY> <VALUE>` uses `|` as the sed delimiter so
          # values with `/` (e.g. URLs) survive without escaping; the
          # function REQUIRES the key to exist in .env.example because
          # `sed s|^KEY=.*|KEY=…|` is a no-op when the line is absent.
          # Every key below is verified present in .env.example —
          # adding a NEW key (not in the example) needs `>> .env`.
          set_env() { sed -i "s|^${1}=.*|${1}=${2}|" .env; }
          set_env APP_ENV testing
          # APP_KEY is generated below by `php artisan key:generate
          # --force` (see "Migrate test database (CLI)") — it REPLACES
          # the empty `APP_KEY=` line from `.env.example` in-place,
          # avoiding the shell-escaping hazard of piping an
          # openssl-generated base64 string through sed.

          # Postgres + pgvector via the service container above — same
          # engine production runs. In CI the workflow starts Laravel
          # explicitly via the "Start Laravel server (testing)" step
          # below and sets `E2E_SKIP_WEBSERVER=1` so playwright.config.ts
          # skips its own `webServer` block (avoids EADDRINUSE on
          # 127.0.0.1:8000). For LOCAL `npm run e2e` runs the
          # `webServer` block boots `php artisan serve` itself.
          # Migrations exercise pgvector cleanly because
          # ensureVectorExtensionExists() can issue CREATE EXTENSION
          # here.
          set_env DB_CONNECTION pgsql
          set_env DB_HOST       127.0.0.1
          set_env DB_PORT       5432
          set_env DB_DATABASE   askmydocs_test
          set_env DB_USERNAME   askmydocs
          set_env DB_PASSWORD   askmydocs
          # Cache/session intentionally NOT on the database — the project
          # has no cache/sessions table migration (production uses redis
          # or file). Spatie's permission migration calls
          # `forgetCachedPermissions()` at the end of its up(), which
          # would crash on `database` driver before the table exists.
          # `array` is sufficient for migrations + a Playwright run;
          # `file` persists session cookies across HTTP requests so
          # login flows survive across page navigations.
          set_env CACHE_STORE     array
          set_env SESSION_DRIVER  file
          # Database-backed queue so /api/kb/ingest dispatches enqueue
          # the job (returning 202) without running it immediately.
          # `sync` would execute IngestDocumentJob on the request thread,
          # which then calls the AI provider synchronously — without API
          # keys in CI, that bubbles up as a 500 from /api/kb/ingest.
          # The test only asserts the 202; the actual indexing flow is
          # covered by PHPUnit feature tests with Http::fake().
          set_env QUEUE_CONNECTION database
          # `storage/framework/*` is gitignored except for `.gitkeep`,
          # so the cache/sessions/views subdirs may not exist on a
          # fresh CI clone. SESSION_DRIVER=file needs `sessions/`;
          # blade views need `views/`; cache fallbacks need `cache/`.
          # `mkdir -p` is idempotent.
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/framework/cache/data
          mkdir -p storage/logs
          mkdir -p bootstrap/cache
          # KB disk root — health check probes Storage::disk('kb')->exists('.').
          # Without this dir the health check returns 'degraded' and
          # admin-dashboard.spec.ts's happy path fails on dashboard-health.
          mkdir -p storage/app/kb

      - name: Migrate test database (CLI)
        # Step name reflects what actually runs here: `key:generate` +
        # `migrate:fresh`. Seeding still happens via POST /testing/seed
        # during Playwright setup (see frontend/e2e/setup-helpers.ts);
        # only the heavy migration is moved off the HTTP path.
        #
        # `key:generate --force` runs FIRST so it replaces the empty
        # `APP_KEY=` line copied from `.env.example` (the previous step
        # leaves it empty deliberately — see "Prepare .env for testing"
        # for the rationale). This produces exactly one APP_KEY=base64:…
        # definition in .env, no duplicates, no ambiguity.
        env:
          APP_ENV: testing
        run: |
          php artisan key:generate --force
          # `migrate:fresh` from CLI (instead of `migrate`) — see R38 in
          # CLAUDE.md. The heavy migration can stall `php artisan serve`'s
          # single-threaded accept loop when it runs inside an HTTP request
          # (the recurring auth.setup ECONNREFUSED flake on /testing/reset).
          # Running `migrate:fresh` here from the CLI BEFORE Playwright
          # starts the web server eliminates the boot-race window: the
          # Playwright step then sets E2E_SKIP_HTTP_RESET=1, which
          # narrows the skip to the SETUP-time `resetAndSeed()` call
          # (auth.setup / viewer.setup / super-admin.setup) — those run
          # against a freshly-booted dev server and are the only HTTP
          # path that ever observed the stall. Per-spec `resetDb()`
          # calls in `frontend/e2e/fixtures.ts` and the spec files
          # STILL hit POST /testing/reset every test: by then the dev
          # server is warm (auth.setup has handled `/healthz` + login)
          # and per-scenario state isolation requires an actual truncate.
          # Heavy work was moved off the COLD-START HTTP path, not off
          # the HTTP path entirely.
          php artisan migrate:fresh --force

      # Start Laravel explicitly in the workflow instead of relying on
      # playwright.config.ts `webServer`. The webServer block boots
      # artisan-serve under Playwright's own process supervisor and pipes
      # stdout/stderr internally — historically that path swallowed the
      # server log when artisan-serve crashed mid-run, and the failure
      # surfaced as an opaque generic timeout. Note: with R38 in place
      # (migrate:fresh from CLI + E2E_SKIP_HTTP_RESET=1) the original
      # auth.setup ECONNREFUSED window on /testing/reset no longer
      # exists — the dev server now only handles light traffic
      # (healthz + /testing/seed + login + page navigations + admin
      # API calls), all single-request safe. The remaining reasons to
      # start the server here ourselves:
      #   1. a real on-disk log we can `tail` in the failure-dump step,
      #   2. an unambiguous binding to 127.0.0.1:8000,
      #   3. a deterministic process group (created by `setsid -f` below
      #      and captured as a PGID via `lsof tcp:8000` + `ps -o pgid=` in
      #      the next step) that the cleanup step can SIGTERM/SIGKILL at
      #      job end — see `Wait for backend` for the actual capture, and
      #      `Stop Laravel server` for the kill path.
      # `E2E_SKIP_WEBSERVER=1` tells playwright.config.ts to skip its own
      # webServer block so we don't double-bind port 8000 (EADDRINUSE).
      - name: Start Laravel server (testing)
        env:
          APP_ENV: testing
          # Honoured because we explicitly run `--no-reload` below — without
          # the flag, Laravel's ServeCommand silently drops the env var and
          # runs the built-in PHP server single-threaded.
          PHP_CLI_SERVER_WORKERS: '4'
        # `setsid -f` runs `php artisan serve` DIRECTLY in a new session
        # (no `bash -c` wrapper). Earlier attempt with `setsid -f bash -c
        # '...'` detached the BASH wrapper, but PHP remained a child of
        # bash; when bash got cleaned up at the runner step boundary,
        # PHP died via terminal hangup cascade. Confirmed by Copilot's
        # round-? finding + the artisan-serve.log dump showing the
        # server died ~1.5s after `/healthz` responded — matching the
        # bash-wrapper PID lifetime, not the actual PHP server.
        # Putting setsid on php DIRECTLY puts PHP itself in the new
        # session/PG, immune to runner cleanup of the previous step's PG.
        # The redirect `>` is parsed by the OUTER bash and applied
        # BEFORE `exec setsid`, so PHP inherits the redirected fd 1/2.
        run: |
          setsid -f php artisan serve --no-reload --host=127.0.0.1 --port=8000 \
              > storage/logs/artisan-serve.log 2>&1
          echo "artisan-serve dispatched via setsid -f (PID captured in Wait for backend via lsof)"

      - name: Wait for backend
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/healthz >/dev/null; then
              echo "Backend is up after ${i}s"
              # Capture the SERVER's process group NOW that the port is
              # bound. With PHP_CLI_SERVER_WORKERS=4 the parent process
              # forks 4 worker children, all sharing the same PGID
              # (created by `setsid -f` in the previous step). lsof can
              # report any of these as the listener; instead of guessing
              # which is "the" PID, capture the PGID once — `kill -- -PGID`
              # in the cleanup step takes down the parent + every worker
              # atomically, with no risk of a single worker outliving
              # the cleanup and holding port 8000. Copilot round-?
              # finding 09:24:28-29 (multi-listener edge case).
              pid=$(lsof -ti tcp:8000 -sTCP:LISTEN | head -1)
              if [ -n "$pid" ]; then
                pgid=$(ps -o pgid= -p "$pid" 2>/dev/null | tr -d ' ')
                if [ -n "$pgid" ]; then
                  echo "$pgid" > /tmp/artisan-serve.pgid
                  echo "Captured artisan-serve PGID=$pgid (sample listener PID=$pid)"
                else
                  echo "WARN: ps could not derive PGID from PID=$pid; falling back to PID-only kill"
                  echo "$pid" > /tmp/artisan-serve.pid
                fi
              else
                echo "WARN: lsof found no listener on :8000 despite healthz 200"
              fi
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not start in time"
          echo "=== storage/logs/artisan-serve.log ==="
          tail -200 storage/logs/artisan-serve.log || true
          exit 1

      - name: Run Playwright (chromium)
        env:
          APP_ENV: testing
          # Skip playwright.config.ts's own webServer block — we already
          # started + health-checked the server above. Without this flag
          # Playwright would race ours and EADDRINUSE on port 8000.
          E2E_SKIP_WEBSERVER: '1'
          # Tells setup-helpers.ts to skip POST /testing/reset (a
          # `migrate:fresh` via HTTP). The DB was already reset cleanly
          # above from the CLI step. Skipping the HTTP reset prevents
          # `php artisan serve` from executing a blocking migration
          # inside an HTTP request — the root cause of ECONNREFUSED on
          # 127.0.0.1:8000 during the setup phase. See R38 + the
          # `ci-failure-investigation` skill rabbit-hole section.
          E2E_SKIP_HTTP_RESET: '1'
        run: npm run e2e

      - name: Dump Laravel log on failure
        if: failure()
        run: |
          echo "=== storage/logs/laravel.log (last 200 lines) ==="
          if [ -f storage/logs/laravel.log ]; then
            tail -200 storage/logs/laravel.log
          else
            echo "(no laravel.log file present)"
          fi
          echo ""
          echo "=== storage/logs/artisan-serve.log (last 200 lines) ==="
          if [ -f storage/logs/artisan-serve.log ]; then
            tail -200 storage/logs/artisan-serve.log
          else
            echo "(no artisan-serve.log file present)"
          fi
          echo ""
          echo "=== ls storage/framework/sessions ==="
          ls -la storage/framework/sessions || echo "(no sessions dir)"

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop Laravel server
        # `if: always()` so the cleanup runs whether Playwright passed,
        # failed, or the job was cancelled. Without this the
        # artisan-serve process group outlives the test step and keeps
        # holding port 8000 + a pool of PHP interpreters.
        #
        # PGID-based kill (preferred): `setsid -f` in the start step put
        # PHP in a NEW process group; PHP_CLI_SERVER_WORKERS=4 forks 4
        # worker children that inherit the same PGID. `kill -- -$PGID`
        # signals every process in that group atomically — no risk of a
        # single worker surviving the cleanup. The PID-only fallback
        # remains for the (unlikely) case where ps could not derive a
        # PGID from the captured listener PID.
        if: always()
        run: |
          term_then_kill() {
            local target="$1"  # e.g. "-12345" for PGID, "12345" for single PID
            local label="$2"
            kill -TERM -- "$target" 2>/dev/null || true
            # Give the process(es) ~2s to flush + exit cleanly.
            sleep 2
            if kill -0 -- "$target" 2>/dev/null; then
              echo "$label still alive after SIGTERM — sending SIGKILL"
              kill -KILL -- "$target" 2>/dev/null || true
            fi
          }

          if [ -f /tmp/artisan-serve.pgid ]; then
            pgid=$(cat /tmp/artisan-serve.pgid)
            echo "Stopping artisan-serve process group (pgid=$pgid)..."
            term_then_kill "-$pgid" "artisan-serve PG"
            rm -f /tmp/artisan-serve.pgid
          elif [ -f /tmp/artisan-serve.pid ]; then
            pid=$(cat /tmp/artisan-serve.pid)
            if kill -0 "$pid" 2>/dev/null; then
              echo "Stopping artisan-serve (pid=$pid, PGID-fallback path)..."
              term_then_kill "$pid" "artisan-serve PID"
            else
              echo "artisan-serve (pid=$pid) already exited; tail of log:"
              tail -50 storage/logs/artisan-serve.log 2>/dev/null || true
            fi
            rm -f /tmp/artisan-serve.pid
          else
            echo "(no /tmp/artisan-serve.pgid or .pid — server step never ran or failed early)"
          fi

          # Belt-and-braces: even after PGID kill, run lsof one more
          # time and SIGKILL anything still holding :8000. This catches
          # any process the runner spawned that bypassed our PGID
          # accounting (defensive cleanup; should be a no-op).
          remaining=$(lsof -ti tcp:8000 -sTCP:LISTEN 2>/dev/null || true)
          if [ -n "$remaining" ]; then
            echo "WARN: residual listeners on :8000 after PGID kill: $remaining"
            for pid in $remaining; do
              kill -KILL "$pid" 2>/dev/null || true
            done
          fi

