name: tests

on:
  push:
    branches: [main, 'feature/v*', 'feature/v*/**']
  pull_request:
    branches: [main, 'feature/v*', 'feature/v*/**']
    # `labeled` is added on top of the defaults (opened/synchronize/reopened)
    # so that adding the `run-e2e` label (R46 final-gate step) fires a fresh
    # workflow run with the label now present — which lights up the gated
    # `playwright` job below. Without `labeled` in this list, `gh pr edit
    # --add-label run-e2e` would NOT re-trigger CI and the E2E job would
    # never run on the labelled state.
    types: [opened, synchronize, reopened, labeled]

# A pushed PR branch fires BOTH the `push` and `pull_request` events, so
# without this the full suite (incl. the long Playwright job) ran TWICE
# concurrently on every commit. The doubled load amplified pre-existing
# E2E flakiness (stateful-Sanctum 419 / render-timing races under
# `php artisan serve`) into consistent failures on PR branches while
# `main` (single push run, no open PR) stayed green.
#
# The group key resolves to the SAME head-commit SHA for both events
# (`pull_request.head.sha` on PR events; `github.sha` on push events),
# so the two runs share one group and the later one cancels the earlier
# — exactly one run per commit. Rapid successive pushes also supersede
# their in-flight predecessor.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # CI-speed experiment (2026-06-22, Lorenzo): the 3-cell matrix
        # (8.3 + 8.4 + 8.5) ran ~10 min in parallel on PR #349. We trim
        # CI to a SINGLE runner on the top minor (8.5) to see if a lone
        # cell is meaningfully faster; if the wall-time is unchanged
        # Lorenzo will tell us to restore the full 8.3/8.4/8.5 matrix.
        # Laravel 13's floor is still PHP 8.3 — local `composer install`
        # pins platform.php=8.3.0, so the floor stays covered off-CI.
        php: ['8.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, sqlite, pdo_sqlite, intl, bcmath
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-php${{ matrix.php }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-php${{ matrix.php }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare test bootstrap dirs
        run: |
          mkdir -p vendor/orchestra/testbench-core/laravel/bootstrap/cache
          mkdir -p bootstrap/cache

      - name: Run PHPUnit
        run: vendor/bin/phpunit --testdox

  vitest:
    name: Vitest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest (react)
        run: npm test

      - name: Run Vitest (legacy rich-content)
        run: npm run test:legacy

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    # R46 — deferred-E2E fast loop. Playwright (~18-20 min) is the most
    # expensive gate and Copilot reviews the DIFF, not E2E results, so
    # running it on every Copilot round is pure waste. It is therefore
    # GATED: it runs only when
    #   (a) the commit is a push to `main` (post-merge safety net — main
    #       must always stay E2E-green), OR
    #   (b) the PR carries the `run-e2e` label (added via
    #       `gh pr edit <N> --add-label run-e2e` ONLY at the very end of
    #       the R46 flow, after php+vite CI is green AND the cloud Copilot
    #       loop has 0 outstanding must-fix).
    # During the unit-CI + Copilot rounds the PR has no label → this job
    # is skipped → CI returns in ~3 min instead of ~25. The `phpunit` and
    # `vitest` jobs above ALWAYS run and remain the per-round gate.
    #
    # NOTE: `github.event_name == 'push'` is true on feature-branch pushes
    # too (a PR-branch push fires both `push` and `pull_request`), so the
    # push arm is narrowed to `refs/heads/main`. Feature-branch E2E is
    # reached exclusively through the label arm.
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      contains(github.event.pull_request.labels.*.name, 'run-e2e')
    # Cap the whole job so Playwright's per-test retry + per-test timeout
    # can't compound to hours when a setup test consistently hits a slow
    # failure. The full suite legitimately runs ~18-20 min (the green
    # baseline was 18m24s), so a 20-min cap cancelled passing runs on
    # slower runner instances purely by timing variance (observed: 20m18s
    # cancelled with ZERO test failures). 30 min gives ~10 min of headroom
    # over the real runtime while still turning a runaway into a sharp loop.
    timeout-minutes: 30
    # Depends on phpunit+vitest so E2E only spins up after core gates
    # are green.
    needs: [phpunit, vitest]

    # Spin up real Postgres + pgvector so the Playwright job exercises
    # the same DB engine production runs. The pgvector/pgvector image
    # ships pgvector preinstalled; Schema::ensureVectorExtensionExists()
    # in the chunks/embedding migrations resolves cleanly here.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: askmydocs
          POSTGRES_PASSWORD: askmydocs
          POSTGRES_DB: askmydocs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U askmydocs -d askmydocs_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # verify-copilot-catalogue.sh walks `git log` to match
          # `fix(enh-*): address Copilot review on PR #N` commits
          # against catalogue rows. The default shallow checkout
          # (depth=1) hides those commits — only the merge commit is
          # visible — which would silently turn the gate into a no-op.
          # Fetch the full history so the gate sees every fix commit
          # in the PR's range.
          fetch-depth: 0

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, sqlite, pdo_sqlite, pgsql, pdo_pgsql, intl, bcmath
          coverage: none
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install PHP deps
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install JS deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify E2E real-data rule (R13)
        # Enforces CLAUDE.md §R13: page.route() is only allowed against
        # external-service boundaries (AI providers, email, payments,
        # remote storage) or with an explicit "R13: failure injection"
        # marker. Blocks merging scenarios that silently stub internal
        # routes and turn E2E into unit tests in E2E clothing.
        run: bash scripts/verify-e2e-real-data.sh

      - name: Verify Copilot findings catalogue integrity
        # Enforces COPILOT-FINDINGS.md protocol: every
        # `fix(enh-*): address Copilot review on PR #N` commit must
        # touch docs/enhancement-plan/COPILOT-FINDINGS.md with at least
        # one row under the matching `### PR #N` heading. Without this
        # gate, fix commits can silently drop from the catalogue and
        # the PR16-style distillation loses its input. See R9 and the
        # COPILOT-FINDINGS.md appendix for the protocol spec.
        run: bash scripts/verify-copilot-catalogue.sh

      - name: Build frontend bundle
        run: npm run build

      - name: Prepare .env for testing
        run: |
          cp .env.example .env || true
          php -r "file_exists('.env') || copy('.env.example', '.env');" || true
          # Override every key via in-place sed so .env ends up with
          # exactly ONE definition per setting. `.env.example` already
          # declares APP_ENV / APP_KEY / DB_* / CACHE_STORE /
          # SESSION_DRIVER / QUEUE_CONNECTION; using `echo ... >> .env`
          # for any of these would duplicate the line (Laravel reads
          # top-down and the LAST occurrence wins, but duplicates are
          # ambiguous and Copilot review flagged them on PR #83).
          # `set_env <KEY> <VALUE>` uses `|` as the sed delimiter so
          # values with `/` (e.g. URLs) survive without escaping; the
          # function REQUIRES the key to exist in .env.example because
          # `sed s|^KEY=.*|KEY=…|` is a no-op when the line is absent.
          # Fail loudly if the key is missing — silently no-opping
          # would let `.env.example` defaults bleed through into the
          # CI run (e.g. `APP_ENV=local` instead of `testing`) and
          # surface as a confusing downstream test failure 5 minutes
          # later. Adding a NEW key (not in the example) needs `>> .env`.
          set_env() {
              if ! grep -qE "^${1}=" .env; then
                  echo "::error::set_env: key '${1}' missing from .env (was it removed from .env.example?)"
                  exit 1
              fi
              sed -i "s|^${1}=.*|${1}=${2}|" .env
          }
          set_env APP_ENV testing
          # E2E diagnosability (R22): force file logging so an unhandled
          # exception from any /api/* route on the Playwright run lands in
          # storage/logs/laravel.log — which the "Dump Laravel log on
          # failure" step tails. The default `stack` channel left that file
          # absent (`(no laravel.log file present)`), so backend errors
          # behind a Playwright "element not visible" timeout were invisible.
          # `single` writes laravel.log; Laravel records full traces there
          # regardless of APP_DEBUG (APP_DEBUG only changes HTTP-response
          # verbosity, so it stays false). Testing-only.
          set_env LOG_CHANNEL single
          # APP_KEY is generated below by `php artisan key:generate
          # --force` (see "Migrate test database (CLI)") — it REPLACES
          # the empty `APP_KEY=` line from `.env.example` in-place,
          # avoiding the shell-escaping hazard of piping an
          # openssl-generated base64 string through sed.

          # Postgres + pgvector via the service container above — same
          # engine production runs. In CI the workflow starts Laravel
          # explicitly via the "Start Laravel server (testing)" step
          # below and sets `E2E_SKIP_WEBSERVER=1` so playwright.config.ts
          # skips its own `webServer` block (avoids EADDRINUSE on
          # 127.0.0.1:8000). For LOCAL `npm run e2e` runs the
          # `webServer` block boots `php artisan serve` itself.
          # Migrations exercise pgvector cleanly because
          # ensureVectorExtensionExists() can issue CREATE EXTENSION
          # here.
          set_env DB_CONNECTION pgsql
          set_env DB_HOST       127.0.0.1
          set_env DB_PORT       5432
          set_env DB_DATABASE   askmydocs_test
          set_env DB_USERNAME   askmydocs
          set_env DB_PASSWORD   askmydocs
          # Cache/session intentionally NOT on the database — the project
          # has no cache/sessions table migration (production uses redis
          # or file). Spatie's permission migration calls
          # `forgetCachedPermissions()` at the end of its up(), which
          # would crash on `database` driver before the table exists.
          # `array` is sufficient for migrations + a Playwright run;
          # `file` persists session cookies across HTTP requests so
          # login flows survive across page navigations.
          set_env CACHE_STORE     array
          set_env SESSION_DRIVER  file
          # Database queue (async) + a dedicated worker started below.
          # Rationale (R38 — heavy work must NOT run inline behind
          # `php artisan serve`): the KB upload progress widget needs the
          # IngestDocumentJob's queue-lifecycle events to fire, but running
          # the WHOLE ingest pipeline INLINE (QUEUE_CONNECTION=sync) makes
          # EVERY KB write synchronous — a `save` in admin-kb-edit /
          # admin-journey then blocks the HTTP request on parse→chunk→embed→
          # persist (+ analyze + auto-wiki), inflating those saves from ~4s
          # to ~15s and tipping them over their Playwright timeouts (observed
          # on the sync-queue runs). Keeping the queue ASYNC preserves the
          # fast save responses the admin specs assert, while a background
          # `queue:work --queue=kb-ingest,default` worker (see "Start KB
          # ingest queue worker") drains the committed jobs so the upload
          # progress still reconciles to done=1. AI stays offline: the worker
          # + server both set AI_PROVIDER=fake, so queued ingest never calls a
          # real provider. admin-kb.spec.ts is agnostic to whether the
          # non-canonical draft ingested (accepts 200/201/202).
          set_env QUEUE_CONNECTION database
          # `storage/framework/*` is gitignored except for `.gitkeep`,
          # so the cache/sessions/views subdirs may not exist on a
          # fresh CI clone. SESSION_DRIVER=file needs `sessions/`;
          # blade views need `views/`; cache fallbacks need `cache/`.
          # `mkdir -p` is idempotent.
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/framework/cache/data
          mkdir -p storage/logs
          mkdir -p bootstrap/cache
          # KB disk root — health check probes Storage::disk('kb')->exists('.').
          # Without this dir the health check returns 'degraded' and
          # admin-dashboard.spec.ts's happy path fails on dashboard-health.
          mkdir -p storage/app/kb

      - name: Migrate test database (CLI)
        # Step name reflects what actually runs here: `key:generate` +
        # `migrate:fresh`. Seeding still happens via POST /testing/seed
        # during Playwright setup (see frontend/e2e/setup-helpers.ts);
        # only the heavy migration is moved off the HTTP path.
        #
        # `key:generate --force` runs FIRST so it replaces the empty
        # `APP_KEY=` line copied from `.env.example` (the previous step
        # leaves it empty deliberately — see "Prepare .env for testing"
        # for the rationale). This produces exactly one APP_KEY=base64:…
        # definition in .env, no duplicates, no ambiguity.
        env:
          APP_ENV: testing
        run: |
          php artisan key:generate --force
          # `migrate:fresh` from CLI (instead of `migrate`) — see R38 in
          # CLAUDE.md. The heavy migration can stall `php artisan serve`'s
          # single-threaded accept loop when it runs inside an HTTP request
          # (the recurring auth.setup ECONNREFUSED flake on /testing/reset).
          # Running `migrate:fresh` here from the CLI BEFORE Playwright
          # starts the web server eliminates the boot-race window: the
          # Playwright step then sets E2E_SKIP_HTTP_RESET=1, which
          # narrows the skip to the SETUP-time `resetAndSeed()` call
          # (auth.setup / viewer.setup / super-admin.setup) — those run
          # against a freshly-booted dev server and are the only HTTP
          # path that ever observed the stall. Per-spec `resetDb()`
          # calls in `frontend/e2e/fixtures.ts` and the spec files
          # STILL hit POST /testing/reset every test: by then the dev
          # server is warm (auth.setup has handled `/healthz` + login)
          # and per-scenario state isolation requires an actual truncate.
          # Heavy work was moved off the COLD-START HTTP path, not off
          # the HTTP path entirely.
          php artisan migrate:fresh --force

      # v8.16/W4 — the AI FinOps admin SPA is a self-contained, package-served
      # Blade SPA (laravel-ai-finops-admin) whose prebuilt Vite assets ship in
      # the vendor dir and are copied to public/vendor/ai-finops-admin by this
      # publish (the host gitignores published assets). admin-ai-finops.spec.ts
      # then loads the real served shell at /admin/ai-finops. Runs AFTER
      # key:generate so the app boots cleanly; --force overwrites any stale copy.
      # No Vite build needed — the package ships the prebuilt bundle.
      - name: Publish AI FinOps admin assets (CLI)
        env:
          APP_ENV: testing
        # `vendor:publish` exits 0 even when a tag resolves to nothing ("No
        # publishable resources for tag") — so assert the assets actually landed,
        # otherwise a tag/discovery drift would ship a green build with an empty
        # public/vendor/ai-finops-admin and the SPA would silently serve its
        # "assets not built" fallback (R4/R14: no silent publish failure).
        run: |
          php artisan vendor:publish --tag=ai-finops-admin-assets --force
          test -n "$(ls -A public/vendor/ai-finops-admin 2>/dev/null)" \
            || { echo '::error::ai-finops-admin assets were not published'; exit 1; }

      - name: Publish AI Guardrails admin assets (CLI)
        env:
          APP_ENV: testing
        # Same rationale as the finops step above: /public/vendor is gitignored,
        # so the guardrails-admin SPA bundle must be published from the vendor dir
        # in CI. Assert it landed, otherwise admin-ai-guardrails.spec.ts would
        # silently exercise the package's "assets not built" fallback (which still
        # renders #agr-root) and pass green without serving the real SPA (R4/R14/R16).
        run: |
          php artisan vendor:publish --tag=ai-guardrails-admin-assets --force
          test -n "$(ls -A public/vendor/ai-guardrails-admin 2>/dev/null)" \
            || { echo '::error::ai-guardrails-admin assets were not published'; exit 1; }

      # Start Laravel explicitly in the workflow instead of relying on
      # playwright.config.ts `webServer`. The webServer block boots
      # artisan-serve under Playwright's own process supervisor and pipes
      # stdout/stderr internally — historically that path swallowed the
      # server log when artisan-serve crashed mid-run, and the failure
      # surfaced as an opaque generic timeout. Note: with R38 in place
      # (migrate:fresh from CLI + E2E_SKIP_HTTP_RESET=1) the original
      # auth.setup ECONNREFUSED window on /testing/reset no longer
      # exists — the dev server now only handles light traffic
      # (healthz + /testing/seed + login + page navigations + admin
      # API calls), all single-request safe. The remaining reasons to
      # start the server here ourselves:
      #   1. a real on-disk log we can `tail` in the failure-dump step,
      #   2. an unambiguous binding to 127.0.0.1:8000,
      #   3. a deterministic process group (created by `setsid -f` below
      #      and captured as a PGID via `lsof tcp:8000` + `ps -o pgid=` in
      #      the next step) that the cleanup step can SIGTERM/SIGKILL at
      #      job end — see `Wait for backend` for the actual capture, and
      #      `Stop Laravel server` for the kill path.
      # `E2E_SKIP_WEBSERVER=1` tells playwright.config.ts to skip its own
      # webServer block so we don't double-bind port 8000 (EADDRINUSE).
      - name: Start Laravel server (testing)
        env:
          APP_ENV: testing
          # Deterministic OFFLINE AI for the Playwright run. The PHP built-in
          # dev server reads these at runtime (no config:cache here), so
          # chat + embeddings resolve to FakeProvider — no external LLM, no
          # API key. chat-stream-browser.spec.ts depends on this: it drives
          # the REAL /messages/stream SSE through the REAL @ai-sdk transport.
          # FakeProvider streams a canned answer + a constant embedding
          # vector, so the E2eStreamSeeder doc is always retrieved and the
          # real `source-url` citation frame is exercised. Every other chat
          # spec stubs the AI boundary, so this is harmless for them. (The
          # same env lives in playwright.config.ts's webServer block for the
          # LOCAL `npm run e2e` path, which is bypassed in CI via
          # E2E_SKIP_WEBSERVER=1.)
          AI_PROVIDER: fake
          AI_EMBEDDINGS_PROVIDER: fake
          # v8.8.3 — anonymous chat ON for the Playwright run so
          # anonymous-chat.spec.ts exercises the real stateless /api/kb/chat
          # turn end-to-end. CI skips playwright.config.ts's webServer block
          # (E2E_SKIP_WEBSERVER=1), so the flag the config sets there does NOT
          # reach this server — it must be declared on THIS step's env. Read at
          # runtime (no config:cache), so config('kb.anonymous_chat.enabled')
          # resolves true. The OFF / 422-reject state is covered by
          # KbChatAnonymousTest (phpunit) + the AnonymousChatView disabled
          # landing (Vitest), per R43.
          KB_ANONYMOUS_CHAT_ENABLED: 'true'
          # v8.13/P11 — light up the Evidence & Risk Review admin surface so its
          # happy-path spec exercises the real enabled dashboards against seeded
          # review rows (R13). Same rationale as KB_ANONYMOUS_CHAT_ENABLED above:
          # CI skips playwright.config.ts's webServer block (E2E_SKIP_WEBSERVER=1),
          # so the flag the config sets there does NOT reach this server — it must
          # be declared on THIS step's env. Read at runtime (no config:cache), so
          # config('evidence-risk-review.api.enabled') resolves true and the
          # package routes register. The default-OFF "unavailable" landing is
          # covered by the EvidenceRiskReviewView Vitest (R43 both states).
          EVIDENCE_RISK_REVIEW_ADMIN_ENABLED: 'true'
          # v8.16/W4 — light up the AI FinOps admin SPA so admin-ai-finops.spec.ts
          # reaches the real package-served Blade SPA at /admin/ai-finops (its
          # prebuilt assets are published by the "Publish AI FinOps admin assets"
          # step above). Same CI-skips-webServer rationale as the flags above: the
          # flag must live on THIS step's env. Read at runtime (no config:cache) so
          # config('ai-finops-admin.enabled') resolves true and the route registers.
          # The default-OFF clean-404 is covered by FinOpsDisabledTest (phpunit),
          # per R43 (both states tested).
          AI_FINOPS_ADMIN_ENABLED: 'true'
          # v8.19/W3 — light up the AI Guardrails admin SPA so admin-ai-guardrails.spec.ts
          # reaches the real package-served Blade shell at /admin/ai-guardrails and
          # proves the viewAiGuardrails gate (admin 200, viewer 403). The default-OFF
          # clean-404 landing is covered by GuardrailsAdminMountingTest (phpunit), per
          # R43 (both states tested).
          AI_GUARDRAILS_ADMIN_ENABLED: 'true'
          # v8.17 — OFFLINE IMAP seam (CONNECTOR_IMAP_FAKE_PING) so
          # connectors-imap-super-admin.spec.ts drives the real credential-connector
          # flow without a live IMAP server (a BACKEND TCP dependency Playwright
          # can't stub). Input-driven fake: host containing invalid/fail → 422,
          # otherwise → ACTIVE. Default-OFF in production. Read at runtime (no
          # config:cache), so config('connectors.fake_imap_ping') resolves true.
          CONNECTOR_IMAP_FAKE_PING: 'true'
          # v8.18/W4 — gamification stays ON (default) so the badges/coaching
          # surfaces render, but the AI NARRATION layer is forced OFF for E2E.
          # The narrator resolves the named `openrouter` provider directly (NOT the
          # `fake` default), so an enabled narrate/regenerate makes a real OpenRouter
          # HTTP call → 401 (no key) / 120s timeout, which stalls the dev server and
          # cascades into following super-admin specs failing. CI skips
          # playwright.config.ts's webServer block (E2E_SKIP_WEBSERVER=1), so this
          # flag MUST live on THIS step's env. With it off the deterministic copy is
          # used (the path admin-gamification-insights-super-admin.spec.ts exercises);
          # the AI-ON path is covered by GamificationInsightsTest (phpunit, mocked
          # AiManager), per R43.
          KB_GAMIFICATION_AI_ENABLED: 'false'
          # Honoured because we explicitly run `--no-reload` below — without
          # the flag, Laravel's ServeCommand silently drops the env var and
          # runs the built-in PHP server single-threaded.
          PHP_CLI_SERVER_WORKERS: '4'
        # `setsid -f` runs `php artisan serve` DIRECTLY in a new session
        # (no `bash -c` wrapper). Earlier attempt with `setsid -f bash -c
        # '...'` detached the BASH wrapper, but PHP remained a child of
        # bash; when bash got cleaned up at the runner step boundary,
        # PHP died via terminal hangup cascade. Confirmed by Copilot's
        # round-? finding + the artisan-serve.log dump showing the
        # server died ~1.5s after `/healthz` responded — matching the
        # bash-wrapper PID lifetime, not the actual PHP server.
        # Putting setsid on php DIRECTLY puts PHP itself in the new
        # session/PG, immune to runner cleanup of the previous step's PG.
        # The redirect `>` is parsed by the OUTER bash and applied
        # BEFORE `exec setsid`, so PHP inherits the redirected fd 1/2.
        run: |
          # `mkdir -p storage/logs` is also done in "Prepare .env for
          # testing", but repeat here to make this step self-contained:
          # if a future refactor moves the step order, the `>` redirect
          # below would otherwise crash with "No such file or directory"
          # and leave the runner with no Laravel server, surfacing as
          # an opaque "server never started" failure 60 s later.
          # `mkdir -p` is idempotent (no-op if the dir already exists).
          mkdir -p storage/logs
          setsid -f php artisan serve --no-reload --host=127.0.0.1 --port=8000 \
              > storage/logs/artisan-serve.log 2>&1
          echo "artisan-serve dispatched via setsid -f (PID captured in Wait for backend via lsof)"

      - name: Wait for backend
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/healthz >/dev/null; then
              echo "Backend is up after ${i}s"
              # Capture the SERVER's process group NOW that the port is
              # bound. With PHP_CLI_SERVER_WORKERS=4 the parent process
              # forks 4 worker children, all sharing the same PGID
              # (created by `setsid -f` in the previous step). lsof can
              # report any of these as the listener; instead of guessing
              # which is "the" PID, capture the PGID once — `kill -- -PGID`
              # in the cleanup step takes down the parent + every worker
              # atomically, with no risk of a single worker outliving
              # the cleanup and holding port 8000. Copilot round-?
              # finding 09:24:28-29 (multi-listener edge case).
              pid=$(lsof -ti tcp:8000 -sTCP:LISTEN | head -1)
              if [ -n "$pid" ]; then
                pgid=$(ps -o pgid= -p "$pid" 2>/dev/null | tr -d ' ')
                if [ -n "$pgid" ]; then
                  echo "$pgid" > /tmp/artisan-serve.pgid
                  echo "Captured artisan-serve PGID=$pgid (sample listener PID=$pid)"
                else
                  echo "WARN: ps could not derive PGID from PID=$pid; falling back to PID-only kill"
                  echo "$pid" > /tmp/artisan-serve.pid
                fi
              else
                echo "WARN: lsof found no listener on :8000 despite healthz 200"
              fi
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not start in time"
          echo "=== storage/logs/artisan-serve.log ==="
          tail -200 storage/logs/artisan-serve.log || true
          exit 1

      # KB UI upload progress reconciles ONLY via queue lifecycle events
      # (JobProcessing/Processed → App\Listeners\KbUploadBatchItemProgress).
      # With the async database queue (set above) a committed batch INSERTS
      # IngestDocumentJob rows; this worker drains them so the events fire and
      # the upload reaches data-done=1 — WITHOUT making KB saves synchronous
      # (that's why we don't use QUEUE_CONNECTION=sync; see the queue comment
      # + R38). Covers `kb-ingest` (IngestDocumentJob, via config('kb.ingest.
      # queue')) and `default` (follow-on analyze/auto-wiki). OFFLINE AI so it
      # never calls a real provider. `setsid -f` detaches it into its own
      # session/PGID (same rationale as the artisan-serve start) so the
      # runner's per-step cleanup can't HUP it mid-run; PGID captured for the
      # "Stop queue worker" cleanup.
      - name: Start KB ingest queue worker (testing)
        env:
          APP_ENV: testing
          AI_PROVIDER: fake
          AI_EMBEDDINGS_PROVIDER: fake
        run: |
          mkdir -p storage/logs
          setsid -f php artisan queue:work database \
              --queue=kb-ingest,default --sleep=1 --tries=3 --no-interaction \
              > storage/logs/queue-worker.log 2>&1
          for i in $(seq 1 10); do
            wpid=$(pgrep -f 'artisan queue:work' | head -1)
            if [ -n "$wpid" ]; then
              wpgid=$(ps -o pgid= -p "$wpid" 2>/dev/null | tr -d ' ')
              if [ -n "$wpgid" ]; then
                echo "$wpgid" > /tmp/queue-worker.pgid
                echo "KB ingest queue worker up (PID=$wpid, PGID=$wpgid)"
              else
                echo "$wpid" > /tmp/queue-worker.pid
                echo "KB ingest queue worker up (PID=$wpid; no PGID)"
              fi
              exit 0
            fi
            sleep 1
          done
          echo "Queue worker did not start in time"
          tail -100 storage/logs/queue-worker.log || true
          exit 1

      - name: Run Playwright (chromium)
        env:
          APP_ENV: testing
          # Skip playwright.config.ts's own webServer block — we already
          # started + health-checked the server above. Without this flag
          # Playwright would race ours and EADDRINUSE on port 8000.
          E2E_SKIP_WEBSERVER: '1'
          # Tells setup-helpers.ts to skip POST /testing/reset (a
          # `migrate:fresh` via HTTP). The DB was already reset cleanly
          # above from the CLI step. Skipping the HTTP reset prevents
          # `php artisan serve` from executing a blocking migration
          # inside an HTTP request — the root cause of ECONNREFUSED on
          # 127.0.0.1:8000 during the setup phase. See R38 + the
          # `ci-failure-investigation` skill rabbit-hole section.
          E2E_SKIP_HTTP_RESET: '1'
        run: npm run e2e

      - name: Dump Laravel log on failure
        if: failure()
        run: |
          echo "=== storage/logs/laravel.log (last 200 lines) ==="
          if [ -f storage/logs/laravel.log ]; then
            tail -200 storage/logs/laravel.log
          else
            echo "(no laravel.log file present)"
          fi
          echo ""
          echo "=== storage/logs/artisan-serve.log (last 200 lines) ==="
          if [ -f storage/logs/artisan-serve.log ]; then
            tail -200 storage/logs/artisan-serve.log
          else
            echo "(no artisan-serve.log file present)"
          fi
          echo ""
          echo "=== storage/logs/queue-worker.log (last 200 lines) ==="
          if [ -f storage/logs/queue-worker.log ]; then
            tail -200 storage/logs/queue-worker.log
          else
            echo "(no queue-worker.log file present)"
          fi
          echo ""
          echo "=== ls storage/framework/sessions ==="
          ls -la storage/framework/sessions || echo "(no sessions dir)"

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop Laravel server
        # `if: always()` so the cleanup runs whether Playwright passed,
        # failed, or the job was cancelled. Without this the
        # artisan-serve process group outlives the test step and keeps
        # holding port 8000 + a pool of PHP interpreters.
        #
        # PGID-based kill (preferred): `setsid -f` in the start step put
        # PHP in a NEW process group; PHP_CLI_SERVER_WORKERS=4 forks 4
        # worker children that inherit the same PGID. `kill -- -$PGID`
        # signals every process in that group atomically — no risk of a
        # single worker surviving the cleanup. The PID-only fallback
        # remains for the (unlikely) case where ps could not derive a
        # PGID from the captured listener PID.
        if: always()
        run: |
          term_then_kill() {
            local target="$1"  # e.g. "-12345" for PGID, "12345" for single PID
            local label="$2"
            kill -TERM -- "$target" 2>/dev/null || true
            # Give the process(es) ~2s to flush + exit cleanly.
            sleep 2
            if kill -0 -- "$target" 2>/dev/null; then
              echo "$label still alive after SIGTERM — sending SIGKILL"
              kill -KILL -- "$target" 2>/dev/null || true
            fi
          }

          if [ -f /tmp/artisan-serve.pgid ]; then
            pgid=$(cat /tmp/artisan-serve.pgid)
            echo "Stopping artisan-serve process group (pgid=$pgid)..."
            term_then_kill "-$pgid" "artisan-serve PG"
            rm -f /tmp/artisan-serve.pgid
          elif [ -f /tmp/artisan-serve.pid ]; then
            pid=$(cat /tmp/artisan-serve.pid)
            if kill -0 "$pid" 2>/dev/null; then
              echo "Stopping artisan-serve (pid=$pid, PGID-fallback path)..."
              term_then_kill "$pid" "artisan-serve PID"
            else
              echo "artisan-serve (pid=$pid) already exited; tail of log:"
              tail -50 storage/logs/artisan-serve.log 2>/dev/null || true
            fi
            rm -f /tmp/artisan-serve.pid
          else
            echo "(no /tmp/artisan-serve.pgid or .pid — server step never ran or failed early)"
          fi

          # Belt-and-braces: even after PGID kill, run lsof one more
          # time and SIGKILL anything still holding :8000. This catches
          # any process the runner spawned that bypassed our PGID
          # accounting (defensive cleanup; should be a no-op).
          remaining=$(lsof -ti tcp:8000 -sTCP:LISTEN 2>/dev/null || true)
          if [ -n "$remaining" ]; then
            echo "WARN: residual listeners on :8000 after PGID kill: $remaining"
            for pid in $remaining; do
              kill -KILL "$pid" 2>/dev/null || true
            done
          fi

      - name: Stop queue worker
        # `if: always()` so the dedicated KB ingest worker started above is
        # reaped whether the run passed, failed, or was cancelled. Mirrors the
        # PGID-then-PID teardown of the artisan-serve step.
        if: always()
        run: |
          term_then_kill() {
            local target="$1"
            kill -TERM -- "$target" 2>/dev/null || true
            sleep 1
            if kill -0 -- "$target" 2>/dev/null; then
              kill -KILL -- "$target" 2>/dev/null || true
            fi
          }
          if [ -f /tmp/queue-worker.pgid ]; then
            wpgid=$(cat /tmp/queue-worker.pgid)
            echo "Stopping queue worker process group (pgid=$wpgid)..."
            term_then_kill "-$wpgid" "queue-worker PG"
            rm -f /tmp/queue-worker.pgid
          elif [ -f /tmp/queue-worker.pid ]; then
            wpid=$(cat /tmp/queue-worker.pid)
            echo "Stopping queue worker (pid=$wpid)..."
            term_then_kill "$wpid" "queue-worker PID"
            rm -f /tmp/queue-worker.pid
          else
            echo "(no /tmp/queue-worker.pgid or .pid — worker step never ran)"
          fi

