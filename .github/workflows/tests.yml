name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Laravel 13 floor is PHP 8.3; we also guarantee 8.4 and 8.5 so
        # the package can ship against the next two PHP minors without
        # regression surprises.
        php: ['8.3', '8.4', '8.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, sqlite, pdo_sqlite, intl, bcmath
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-php${{ matrix.php }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-php${{ matrix.php }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare test bootstrap dirs
        run: |
          mkdir -p vendor/orchestra/testbench-core/laravel/bootstrap/cache
          mkdir -p bootstrap/cache

      - name: Run PHPUnit
        run: vendor/bin/phpunit --testdox

  vitest:
    name: Vitest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest (react)
        run: npm test

      - name: Run Vitest (legacy rich-content)
        run: npm run test:legacy

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    # Depends on phpunit+vitest so E2E only spins up after core gates
    # are green.
    needs: [phpunit, vitest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # verify-copilot-catalogue.sh walks `git log` to match
          # `fix(enh-*): address Copilot review on PR #N` commits
          # against catalogue rows. The default shallow checkout
          # (depth=1) hides those commits — only the merge commit is
          # visible — which would silently turn the gate into a no-op.
          # Fetch the full history so the gate sees every fix commit
          # in the PR's range.
          fetch-depth: 0

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, sqlite, pdo_sqlite, intl, bcmath
          coverage: none
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install PHP deps
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install JS deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify E2E real-data rule (R13)
        # Enforces CLAUDE.md §R13: page.route() is only allowed against
        # external-service boundaries (AI providers, email, payments,
        # remote storage) or with an explicit "R13: failure injection"
        # marker. Blocks merging scenarios that silently stub internal
        # routes and turn E2E into unit tests in E2E clothing.
        run: bash scripts/verify-e2e-real-data.sh

      - name: Verify Copilot findings catalogue integrity
        # Enforces COPILOT-FINDINGS.md protocol: every
        # `fix(enh-*): address Copilot review on PR #N` commit must
        # touch docs/enhancement-plan/COPILOT-FINDINGS.md with at least
        # one row under the matching `### PR #N` heading. Without this
        # gate, fix commits can silently drop from the catalogue and
        # the PR16-style distillation loses its input. See R9 and the
        # COPILOT-FINDINGS.md appendix for the protocol spec.
        run: bash scripts/verify-copilot-catalogue.sh

      - name: Build frontend bundle
        run: npm run build

      - name: Prepare .env for testing
        run: |
          cp .env.example .env || true
          php -r "file_exists('.env') || copy('.env.example', '.env');" || true
          echo "APP_ENV=testing" >> .env
          echo "APP_KEY=base64:$(openssl rand -base64 32)" >> .env
          # Force SQLite for CI — Playwright boots the server via
          # playwright.config.ts webServer and we don't spin Postgres here.
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=$GITHUB_WORKSPACE/database/database.sqlite" >> .env
          echo "SESSION_DRIVER=database" >> .env
          echo "CACHE_STORE=database" >> .env
          echo "QUEUE_CONNECTION=sync" >> .env
          touch database/database.sqlite

      - name: Migrate + seed test data
        env:
          APP_ENV: testing
        run: |
          php artisan key:generate --force
          php artisan migrate --force

      # playwright.config.ts `webServer` launches `php artisan serve`
      # automatically, waits on baseURL readiness, and shuts it down
      # after the suite. No explicit background server step needed.
      - name: Run Playwright (chromium)
        env:
          APP_ENV: testing
        run: npm run e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

